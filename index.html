<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bhutan Rocks— Geological Map search portal</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="map"></div>

<div id="sidebar" class="panel">
  <header>
    <h1>🇧🇹 Bhutan Orogeny</span></h1>
    <div class="sub">Geologic Map (Long et al., 2011) &amp; Administrative Layers</div>
    <button id="collapse" title="Collapse">▾</button>
  </header>
  <div class="body">
    <h3>Basemap</h3>
    <div class="basemaps" id="basemaps"></div>

    <h3>Layers</h3>
    <div id="layers"></div>

    <h3>Geology Opacity</h3>
    <input type="range" id="opacity" min="0" max="100" value="70">

    <h3>Geologic Units — click a unit for details</h3>
    <input id="search" type="text" placeholder="Filter units… (code, name, rock type)">
    <div class="unit-actions"><a id="allOn">Show all</a><a id="allOff">Hide all</a><a id="grpToggle">Collapse groups</a></div>
    <div id="units"></div>
  </div>
</div>

<div id="info" class="panel"></div>
<div id="detail" class="panel"><span class="close" onclick="this.parentNode.style.display='none'">✕</span><div id="detailBody"></div></div>

<!-- Embedded datasets (plain-script globals so the page works over file://) -->
<script src="data/geology.js"></script>
<script src="data/country.js"></script>
<script src="data/dzongkhag.js"></script>
<script src="data/gewog.js"></script>
<script src="data/watershed.js"></script>
<script src="data/units.js"></script>

<!-- App logic, in dependency order (see js/*.js headers) -->
<script src="js/colors.js"></script>
<script src="js/panels.js"></script>
<script src="js/basemaps.js"></script>
<script src="js/layers.js"></script>
<script src="js/main.js"></script>
<script src="js/sidebar.js"></script>
</body>
</html>
